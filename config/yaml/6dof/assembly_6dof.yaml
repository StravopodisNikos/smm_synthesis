## Set the SMM active dof, available: 4-6
dof: 6
## structure string definition
# MATLAB VARIABLE: [structure], MATLAB FILE: [insert_robot_gazebo]
s1: 0   # default
s2: 21  # cannot be 31 or 9
s3: 21  # cannot be 9 if s2 is 9 #cannot be 31 if s2 is 9
s4: 0
s5: 31
s6: 31  # cannot be 9 if s5 is 9
s7: 0
s8: 21  # [6dof only] cannot be 9 for 4,5,6 dof. for 3dof MUST be 9
s9: 31  # [6dof only] for 3dof MUST be 9
## assembly parameters setting
# MATLAB VARIABLE: [assembly_parameters], MATLAB FILE: [insert_robot_gazebo]
#synthetic_origin_xzp_1_123: -> x(4-6):Here syn4(under 21) or syn2(back31) are passed
synthetic_origin_xzp_1_x: -0.0500
synthetic_origin_xzp_1_z: 0.0500   # when 3.14 is given for pitch angle(below) in overleaf table the sign HERE must change!
synthetic_origin_xzp_1_p: 0.0000
#synthetic_origin_xzp_2_123: -> x(7-9)
synthetic_origin_xzp_2_x: 0.0050
synthetic_origin_xzp_2_z: 0.0250
synthetic_origin_xzp_2_p: 1.5708 
#synthetic_origin_xzp_3_123: -> x(10-12)
synthetic_origin_xzp_3_x:  -0.0400
synthetic_origin_xzp_3_z:  0.00000
synthetic_origin_xzp_3_p:  1.5708
# [6dof only] synthetic_origin_xzp_4_123: -> not yet in ga-chromosome 
synthetic_origin_xzp_4_x: 0.0050
synthetic_origin_xzp_4_z: 0.0250
synthetic_origin_xzp_4_p: 1.5708 
# [6dof only] synthetic_origin_xzp_5_123: -> not yet in ga-chromosome
synthetic_origin_xzp_5_x:  -0.0400
synthetic_origin_xzp_5_z:  0.00000
synthetic_origin_xzp_5_p:  1.5708

# The second index must always agree with the active_assembly_index commented in the above line in the corresponding xacro file!
#active2pseudo_origin_p_4_123: -> x(13-14)
active2pseudo_origin_p_4_1: 0       # dummy always zero!
active2pseudo_origin_p_4_2: 1.5708
active2pseudo_origin_p_4_3: 1.5708
## pseudojoints' setting
# MATLAB VARIABLE: [qp_xacro_user_given->anatomy]
pseudo1_angle:   0.0000
pseudo2_angle:   0.0000
pseudo3_angle:   0.0000
pseudo4_angle:   0.0000
pseudo5_angle:   0.0000 # [6dof only]
pseudo6_angle:   0.0000 # [6dof only]

